kind = "web"
previewPath = "/"
title = "لمسة أوركيد - بوت الردود"
version = "1.0.0"
id = "artifacts/orchid-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22123

[services.development]
run = "pnpm --filter @workspace/orchid-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/orchid-dashboard", "run", "build" ]
publicDir = "artifacts/orchid-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22123"
BASE_PATH = "/"
