services:
  - type: web
    name: orchid-bot
    runtime: node
    plan: free
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      PORT=3000 BASE_PATH=/ pnpm --filter @workspace/orchid-dashboard build &&
      pnpm --filter @workspace/api-server build
    preDeployCommand: pnpm --filter @workspace/db push
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: orchid-db
          property: connectionString
      - key: PAGE_ACCESS_TOKEN
        sync: false
      - key: PAGE_ID
        sync: false
      - key: INSTAGRAM_ACCOUNT_ID
        sync: false
      - key: OPENAI_KEY
        sync: false

databases:
  - name: orchid-db
    databaseName: orchid
    user: orchid_user
    plan: free
