openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bot
    description: Instagram bot operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get bot status
      description: Returns current bot status and statistics
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"
  /bot/replies:
    get:
      operationId: getBotReplies
      tags: [bot]
      summary: Get recent replies
      description: Returns a list of recent replies sent by the bot
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of replies
          content:
            application/json:
              schema:
                type: object
                properties:
                  replies:
                    type: array
                    items:
                      $ref: "#/components/schemas/BotReply"
                required:
                  - replies
  /bot/dm-replies:
    get:
      operationId: getBotDmReplies
      tags: [bot]
      summary: Get recent DM replies
      description: Returns a list of recent DM replies sent by the bot
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of DM replies
          content:
            application/json:
              schema:
                type: object
                properties:
                  replies:
                    type: array
                    items:
                      $ref: "#/components/schemas/BotDmReply"
                required:
                  - replies
  /bot/start:
    post:
      operationId: startBot
      tags: [bot]
      summary: Start the bot
      description: Start the Instagram bot worker
      responses:
        "200":
          description: Bot started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"
  /bot/stop:
    post:
      operationId: stopBot
      tags: [bot]
      summary: Stop the bot
      description: Stop the Instagram bot worker
      responses:
        "200":
          description: Bot stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    BotDmReply:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: string
        messageId:
          type: string
        messageText:
          type: string
        replyText:
          type: string
        senderUsername:
          type: string
          nullable: true
        senderId:
          type: string
          nullable: true
        repliedAt:
          type: string
      required:
        - id
        - conversationId
        - messageId
        - messageText
        - replyText
        - senderUsername
        - senderId
        - repliedAt
    BotStatus:
      type: object
      properties:
        running:
          type: boolean
        totalReplies:
          type: integer
        totalDmReplies:
          type: integer
        instagramAccountId:
          type: string
          nullable: true
        lastChecked:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
      required:
        - running
        - totalReplies
        - totalDmReplies
        - instagramAccountId
        - lastChecked
        - errorMessage
    BotReply:
      type: object
      properties:
        id:
          type: integer
        commentId:
          type: string
        commentText:
          type: string
        replyText:
          type: string
        username:
          type: string
          nullable: true
        postId:
          type: string
        repliedAt:
          type: string
      required:
        - id
        - commentId
        - commentText
        - replyText
        - username
        - postId
        - repliedAt
